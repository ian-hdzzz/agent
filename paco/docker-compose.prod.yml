# ============================================
# PACO Stack - Production Overrides
# ============================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Changes from base:
#   - All ports bound to 127.0.0.1 (Traefik handles external access)
#   - Resource limits per container (CPU + memory)
#   - JSON log rotation (50MB, 5 files)
#   - PostgreSQL tuning for production
#

x-logging-defaults: &logging-defaults
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

x-mcp-defaults: &mcp-defaults
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:
  clickhouse:
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
    <<: *logging-defaults

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=8MB
      -c maintenance_work_mem=128MB
      -c max_connections=200
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    <<: *logging-defaults

  redis:
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    <<: *logging-defaults

  langfuse:
    ports:
      - "127.0.0.1:3001:3000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    <<: *logging-defaults

  paco-backend:
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    <<: *logging-defaults

  paco-frontend:
    ports:
      - "127.0.0.1:3006:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    <<: *logging-defaults

  cea-tools:
    ports:
      - "127.0.0.1:3010:3000"
    <<: *mcp-defaults

  agora-tools:
    ports:
      - "127.0.0.1:3011:3000"
    <<: *mcp-defaults
