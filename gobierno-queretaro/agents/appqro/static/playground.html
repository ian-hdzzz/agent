<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Playground</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #22253a;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --radius: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--text-dim);
        }

        .badge {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge.success { background: var(--success); }
        .badge.warning { background: var(--warning); color: #000; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-types {
            display: flex;
            gap: 4px;
        }

        .task-type-chip {
            background: var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        /* Main Layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Chat Panel */
        .chat-panel {
            flex: 6;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.error {
            align-self: flex-start;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .typing-indicator {
            align-self: flex-start;
            display: none;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator.visible { display: flex; gap: 4px; }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: typing 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* Input Bar */
        .input-bar {
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .input-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-bar input:focus {
            border-color: var(--accent);
        }

        .input-bar input::placeholder {
            color: var(--text-dim);
        }

        .input-bar button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: var(--font);
        }

        .input-bar button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .input-bar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Timeline Panel */
        .timeline-panel {
            flex: 4;
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }

        .timeline-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .timeline-header h2 {
            font-size: 14px;
            font-weight: 600;
        }

        .timeline-header .clear-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-family: var(--font);
        }

        .timeline-header .clear-btn:hover {
            border-color: var(--text-dim);
            color: var(--text);
        }

        .timeline-steps {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .timeline-steps::-webkit-scrollbar {
            width: 6px;
        }

        .timeline-steps::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .timeline-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timeline-step:hover {
            background: var(--surface-hover);
        }

        .step-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            font-weight: 600;
        }

        .step-icon.start { background: rgba(99, 102, 241, 0.2); color: var(--accent); }
        .step-icon.classify { background: rgba(59, 130, 246, 0.2); color: var(--info); }
        .step-icon.handler { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .step-icon.tool-call { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .step-icon.tool-result { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .step-icon.response { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .step-icon.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        .step-icon.done { background: rgba(99, 102, 241, 0.2); color: var(--accent); }

        .step-content {
            flex: 1;
            min-width: 0;
        }

        .step-label {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .step-detail {
            color: var(--text-dim);
            font-size: 12px;
            font-family: var(--mono);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .step-detail.expandable {
            cursor: pointer;
            max-height: 20px;
            transition: max-height 0.3s ease;
        }

        .step-detail.expandable.expanded {
            max-height: 300px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .step-time {
            color: var(--text-dim);
            font-size: 11px;
            font-family: var(--mono);
            flex-shrink: 0;
        }

        .timeline-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }

        /* Run separator in timeline */
        .timeline-separator {
            text-align: center;
            color: var(--text-dim);
            font-size: 11px;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .chat-panel { border-right: none; border-bottom: 1px solid var(--border); }
            .timeline-panel { max-height: 40vh; }
            .task-types { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-icon">P</div>
            <div>
                <h1 id="agent-name">Agent Playground</h1>
                <div class="subtitle" id="agent-subtitle">Loading...</div>
            </div>
        </div>
        <div class="header-right">
            <div class="task-types" id="task-types"></div>
            <span class="badge" id="agent-status">connecting</span>
        </div>
    </div>

    <div class="main">
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages">
                <div class="typing-indicator" id="typing">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
            <div class="input-bar">
                <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button id="send-btn" onclick="playground.sendMessage()">Enviar</button>
            </div>
        </div>

        <div class="timeline-panel">
            <div class="timeline-header">
                <h2>Execution Timeline</h2>
                <button class="clear-btn" onclick="playground.clearTimeline()">Clear</button>
            </div>
            <div class="timeline-steps" id="timeline-steps">
                <div class="timeline-empty" id="timeline-empty">
                    Send a message to see the<br>agent execution timeline
                </div>
            </div>
        </div>
    </div>

    <script>
    class AgentPlayground {
        constructor() {
            this.conversationHistory = [];
            this.isProcessing = false;
            this.stepCounter = 0;
            this.runCounter = 0;

            this.elements = {
                agentName: document.getElementById('agent-name'),
                agentSubtitle: document.getElementById('agent-subtitle'),
                agentStatus: document.getElementById('agent-status'),
                taskTypes: document.getElementById('task-types'),
                chatMessages: document.getElementById('chat-messages'),
                typing: document.getElementById('typing'),
                messageInput: document.getElementById('message-input'),
                sendBtn: document.getElementById('send-btn'),
                timelineSteps: document.getElementById('timeline-steps'),
                timelineEmpty: document.getElementById('timeline-empty'),
            };

            this.init();
        }

        async init() {
            // Enter key sends message
            this.elements.messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !this.isProcessing) {
                    e.preventDefault();
                    this.sendMessage();
                }
            });

            // Fetch agent info
            try {
                const [healthRes, infoRes] = await Promise.all([
                    fetch('/health'),
                    fetch('/info'),
                ]);

                if (healthRes.ok) {
                    const health = await healthRes.json();
                    this.elements.agentName.textContent = health.agent_name || 'Agent Playground';
                    this.elements.agentSubtitle.textContent = `${health.agent_id} · ${health.category_code}`;
                    this.elements.agentStatus.textContent = health.status || 'ready';
                    this.elements.agentStatus.className = 'badge success';

                    // Show task types
                    if (health.task_types) {
                        this.elements.taskTypes.innerHTML = health.task_types
                            .map(t => `<span class="task-type-chip">${t}</span>`)
                            .join('');
                    }
                }

                if (infoRes.ok) {
                    const info = await infoRes.json();
                    document.title = `${info.agent_name || 'Agent'} — Playground`;
                }
            } catch (err) {
                console.error('Failed to fetch agent info:', err);
                this.elements.agentStatus.textContent = 'offline';
                this.elements.agentStatus.className = 'badge warning';
                this.elements.agentSubtitle.textContent = 'Could not connect to agent';
            }

            this.elements.messageInput.focus();
        }

        addChatMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            this.elements.chatMessages.insertBefore(div, this.elements.typing);
            this.scrollChat();
        }

        scrollChat() {
            this.elements.chatMessages.scrollTop = this.elements.chatMessages.scrollHeight;
        }

        showTyping(show) {
            this.elements.typing.className = show ? 'typing-indicator visible' : 'typing-indicator';
            if (show) this.scrollChat();
        }

        addTimelineStep(step, label, detail, iconClass, timeStr) {
            if (this.elements.timelineEmpty) {
                this.elements.timelineEmpty.remove();
                this.elements.timelineEmpty = null;
            }

            this.stepCounter++;

            const div = document.createElement('div');
            div.className = 'timeline-step';

            const icon = document.createElement('div');
            icon.className = `step-icon ${iconClass}`;
            icon.textContent = this.stepCounter;

            const content = document.createElement('div');
            content.className = 'step-content';

            const labelEl = document.createElement('div');
            labelEl.className = 'step-label';
            labelEl.textContent = label;

            content.appendChild(labelEl);

            if (detail) {
                const detailEl = document.createElement('div');
                detailEl.className = 'step-detail expandable';
                detailEl.textContent = detail;
                detailEl.addEventListener('click', () => {
                    detailEl.classList.toggle('expanded');
                });
                content.appendChild(detailEl);
            }

            const timeEl = document.createElement('div');
            timeEl.className = 'step-time';
            timeEl.textContent = timeStr || '';

            div.appendChild(icon);
            div.appendChild(content);
            div.appendChild(timeEl);

            this.elements.timelineSteps.appendChild(div);
            this.elements.timelineSteps.scrollTop = this.elements.timelineSteps.scrollHeight;
        }

        clearTimeline() {
            this.elements.timelineSteps.innerHTML = '';
            const empty = document.createElement('div');
            empty.className = 'timeline-empty';
            empty.id = 'timeline-empty';
            empty.innerHTML = 'Send a message to see the<br>agent execution timeline';
            this.elements.timelineSteps.appendChild(empty);
            this.elements.timelineEmpty = empty;
            this.stepCounter = 0;
        }

        formatTime(timestamp) {
            if (!timestamp) return '';
            const d = new Date(timestamp * 1000);
            return d.toLocaleTimeString('es-MX', { hour12: false });
        }

        async sendMessage() {
            const input = this.elements.messageInput;
            const text = input.value.trim();
            if (!text || this.isProcessing) return;

            this.isProcessing = true;
            input.value = '';
            this.elements.sendBtn.disabled = true;

            // Add user message to chat
            this.addChatMessage(text, 'user');
            this.showTyping(true);

            // Add run separator to timeline
            this.runCounter++;
            if (this.runCounter > 1) {
                const sep = document.createElement('div');
                sep.className = 'timeline-separator';
                sep.textContent = `Run #${this.runCounter}`;
                this.elements.timelineSteps.appendChild(sep);
            }
            this.stepCounter = 0;

            try {
                const body = {
                    message: text,
                    conversation_history: this.conversationHistory.length > 0 ? this.conversationHistory : null,
                };

                const response = await fetch('/playground/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const event = JSON.parse(line.slice(6));
                                this.handleStepEvent(event);
                            } catch (e) {
                                // Skip malformed events
                            }
                        }
                    }
                }

                // Process remaining buffer
                if (buffer.startsWith('data: ')) {
                    try {
                        const event = JSON.parse(buffer.slice(6));
                        this.handleStepEvent(event);
                    } catch (e) {}
                }

                // Update conversation history
                this.conversationHistory.push({ role: 'user', content: text });

            } catch (err) {
                console.error('Stream error:', err);
                this.addChatMessage(`Error: ${err.message}`, 'error');
                this.addTimelineStep('error', 'Connection Error', err.message, 'error', '');
            } finally {
                this.showTyping(false);
                this.isProcessing = false;
                this.elements.sendBtn.disabled = false;
                this.elements.messageInput.focus();
            }
        }

        handleStepEvent(event) {
            const time = this.formatTime(event.timestamp);

            switch (event.step) {
                case 'agent_start':
                    this.addTimelineStep(
                        'agent_start',
                        `Agent: ${event.data.agent_name || event.agent_id}`,
                        `Message: "${event.data.message}"`,
                        'start',
                        time
                    );
                    break;

                case 'classify':
                    this.addTimelineStep(
                        'classify',
                        `Classified: ${event.data.task_type}`,
                        null,
                        'classify',
                        time
                    );
                    break;

                case 'handler_start':
                    this.addTimelineStep(
                        'handler_start',
                        `Handler: ${event.data.handler}`,
                        `Task type: ${event.data.task_type}`,
                        'handler',
                        time
                    );
                    break;

                case 'tool_call':
                    this.addTimelineStep(
                        'tool_call',
                        `Tool Call: ${event.tool_name}`,
                        JSON.stringify(event.data.input, null, 2),
                        'tool-call',
                        time
                    );
                    break;

                case 'tool_result':
                    this.addTimelineStep(
                        'tool_result',
                        `Tool Result: ${event.tool_name}`,
                        typeof event.data.output === 'string' ? event.data.output : JSON.stringify(event.data.output, null, 2),
                        'tool-result',
                        time
                    );
                    break;

                case 'response':
                    this.showTyping(false);
                    this.addChatMessage(event.data.text, 'agent');
                    this.conversationHistory.push({ role: 'assistant', content: event.data.text });
                    this.addTimelineStep(
                        'response',
                        'Agent Response',
                        event.data.text.substring(0, 200) + (event.data.text.length > 200 ? '...' : ''),
                        'response',
                        event.duration_ms ? `${Math.round(event.duration_ms)}ms` : time
                    );
                    break;

                case 'error':
                    this.showTyping(false);
                    this.addChatMessage(`Error: ${event.data.error}`, 'error');
                    this.addTimelineStep(
                        'error',
                        'Error',
                        event.data.error,
                        'error',
                        time
                    );
                    break;

                case 'done':
                    this.addTimelineStep(
                        'done',
                        'Done',
                        `Total: ${Math.round(event.data.total_duration_ms)}ms`,
                        'done',
                        time
                    );
                    break;
            }
        }
    }

    const playground = new AgentPlayground();
    </script>
</body>
</html>
