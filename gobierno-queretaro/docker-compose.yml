  # ===== VOICE GATEWAY =====

  voice-gateway:
    build: ./voice-gateway
    container_name: gobierno-voice-gateway
    restart: unless-stopped
    ports:
      - "9190:8000"  # Avoids conflict with PACO port range (8000) and ClickHouse (9000)
    environment:
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Voice configuration
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-cgSgspJ2msm6clMCkdW9}
      - ELEVENLABS_MODEL_ID=${ELEVENLABS_MODEL_ID:-eleven_turbo_v2}
      - DEEPGRAM_MODEL=${DEEPGRAM_MODEL:-nova-2}
      - DEEPGRAM_LANGUAGE=${DEEPGRAM_LANGUAGE:-es-419}
    depends_on:
      - orchestrator
      - redis
    networks:
      - gobierno-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===== OBSERVABILITY =====

  # Jaeger: Distributed tracing backend for agent-lightning traces
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: gobierno-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - gobierno-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16687"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== SHARED SERVICES =====

  redis:
    image: redis:7-alpine
    container_name: gobierno-redis
    restart: unless-stopped
    # Port not exposed to host - use internal Docker network (gobierno_redis:6379)
    # Avoids conflict with existing Redis on host
    volumes:
      - redis_data:/data
    networks:
      - gobierno-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: gobierno-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=gobierno
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    # Port not exposed to host - use internal Docker network (gobierno_postgres:5432)
    # Avoids conflict with agora_postgres on port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/db/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./shared/db/migrations/002_memory_tables.sql:/docker-entrypoint-initdb.d/002_memory_tables.sql:ro
      - ./shared/db/migrations/003_classifier_metadata.sql:/docker-entrypoint-initdb.d/003_classifier_metadata.sql:ro
    networks:
      - gobierno-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gobierno"]
      interval: 10s
      timeout: 5s
      retries: 3

