# ============================================
# Gobierno Querétaro - Multi-Agent Orchestration
# LangGraph + Docker Microservices Architecture
# ============================================
#
# Usage:
#   docker-compose up --build        # Build and start all services
#   docker-compose up --build -d     # Build and start in background
#   docker-compose up orchestrator   # Start only orchestrator
#   docker-compose logs -f           # Follow logs
#   docker-compose down              # Stop and remove
#
# Architecture:
#   - Tier 0: Orchestrator (routes to specialists)
#   - Tier 1: 13 Independent Government Service Agents
#   - Shared: PostgreSQL, Redis

services:
  # ===== TIER 0: ORCHESTRATOR =====
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: gobierno-orchestrator
    restart: unless-stopped
    ports:
      - "9100:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/gobierno
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Agent endpoints (Docker DNS)
      - AGENT_WATER_URL=http://agent-water-cea:8000
      - AGENT_TRANSPORT_URL=http://agent-transport-ameq:8000
      - AGENT_EDUCATION_URL=http://agent-education-usebeq:8000
      - AGENT_VEHICLES_URL=http://agent-vehicles:8000
      - AGENT_PSYCHOLOGY_URL=http://agent-psychology-sejuve:8000
      - AGENT_WOMEN_URL=http://agent-women-iqm:8000
      - AGENT_CULTURE_URL=http://agent-culture:8000
      - AGENT_REGISTRY_URL=http://agent-registry-rpp:8000
      - AGENT_LABOR_URL=http://agent-labor-cclq:8000
      - AGENT_HOUSING_URL=http://agent-housing-iveq:8000
      - AGENT_APPQRO_URL=http://agent-appqro:8000
      - AGENT_SOCIAL_URL=http://agent-social-sedesoq:8000
      - AGENT_CITIZEN_URL=http://agent-citizen-attention:8000
      # Admin API
      - PACO_ADMIN_API_KEY=${PACO_ADMIN_API_KEY:-}
      # Paco JWT auth (shared secret for accepting Paco JWT tokens)
      - PACO_JWT_SECRET=${PACO_JWT_SECRET:-}
      # Rate limiting
      - RATE_LIMIT_ROUTE=${RATE_LIMIT_ROUTE:-60/minute}
      - RATE_LIMIT_CLASSIFY=${RATE_LIMIT_CLASSIFY:-120/minute}
      # Agent-Lightning tracing
      - OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - redis
      - postgres
    networks:
      - gobierno-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===== TIER 1: INDEPENDENT AGENTS =====

  # Agent 1: Water Services - CEA
  agent-water-cea:
    build:
      context: .
      dockerfile: agents/water-cea/Dockerfile
