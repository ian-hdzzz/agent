      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/gobierno
      - REDIS_URL=redis://redis:6379
      - CEA_PROXY_URL=${CEA_PROXY_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
